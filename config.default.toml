[app]
first_run = true
preset = "korean_optimized"
websocket_enabled = false
websocket_port = 9090
subtitle_log = false
log_level = "WARNING"
hotkey_toggle = "ctrl+shift+m"
hotkey_overlay = "ctrl+shift+o"
hotkey_settings = "ctrl+shift+s"

[audio]
sample_rate = 16000
chunk_duration_ms = 30
queue_maxsize = 100
capture_mode = "system"
target_app_pid = 0

[vad]
model_name = "fsmn-vad"
max_single_segment_time = 30000
silence_duration_ms = 700
energy_threshold = 0.005
min_segment_ms = 300

[stt]
model_name = "FunAudioLLM/SenseVoiceSmall"
device = "cuda:0"
language = "auto"
use_itn = true
batch_size_s = 60

[translator]
model_path = ""
target_language = "Korean"
n_ctx = 2048
n_gpu_layers = -1
temperature = 0.1
max_tokens = 256
buffer_enabled = true
buffer_max_chars = 200
buffer_flush_ms = 500

[overlay]
font_family = "Malgun Gothic"
font_size = 24
font_color = "#FFFFFF"
bg_opacity = 0.8
show_original = true
max_lines = 2
position = "bottom-center"
custom_x = -1
custom_y = -1
